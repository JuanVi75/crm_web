<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM CONFIGURACIONES</title>

    <style>
        * {
            box-sizing: border-box
        }

        body {
            margin: 0;
            background: #0b1220;
            color: #fff;
            font-family: Arial
        }

        .main-container {
            display: flex;
            height: 100vh
        }

        .sidebar {
            width: 220px;
            background: #0f172a;
            border-right: 1px solid #1e293b;
            padding: 12px
        }

        .logo {
            font-weight: bold;
            color: #60a5fa;
            margin-bottom: 15px
        }

        .menu-item {
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            color: #cbd5e1;
            font-size: 13px
        }

        .menu-item:hover {
            background: #1e293b
        }

        .content {
            flex: 1;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 14px
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #111827;
            border: 1px solid #1e293b;
            padding: 10px;
            border-radius: 10px
        }

        .panel {
            background: #111827;
            border: 1px solid #1e293b;
            border-radius: 12px;
            padding: 12px
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px
        }

        .btn {
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #334155;
            background: #1e293b;
            color: #fff;
            cursor: pointer;
            font-size: 12px
        }

        .btn:hover {
            background: #273449
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, .6);
            align-items: center;
            justify-content: center
        }

        .box {
            width: 600px;
            background: #0f172a;
            border: 1px solid #1e293b;
            padding: 15px;
            border-radius: 10px
        }

        input,
        textarea {
            width: 100%;
            padding: 8px;
            margin: 6px 0;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #1e293b;
            color: #fff;
            font-size: 12px
        }

        .search {
            max-height: 150px;
            overflow: auto;
            background: #1e293b;
            border-radius: 8px
        }

        .item {
            padding: 8px;
            cursor: pointer;
            font-size: 12px
        }

        .item:hover {
            background: #273449
        }
    </style>
</head>

<body>

    <div class="main-container">

        <!-- SIDEBAR OK -->
        <div class="sidebar">
            <div class="logo">CRM WEB</div>

            <div class="menu-item" onclick="window.location.href='index.html'">🏠 INICIO</div>
            <div class="menu-item" onclick="window.location.href='clientes.html'">👥 CLIENTES</div>
            <div class="menu-item" onclick="window.location.href='seguimientos.html'">📅 SEGUIMIENTOS</div>
            <div class="menu-item" onclick="window.location.href='llamadas.html'">📞 LLAMADAS</div>
            <div class="menu-item" onclick="window.location.href='cotizaciones.html'">📄 COTIZACIONES</div>
            <div class="menu-item" onclick="window.location.href='pedidos.html'">📦 PEDIDOS</div>
            <div class="menu-item" onclick="window.location.href='configuraciones.html'">⚙️ CONFIGURACIONES</div>
        </div>

        <!-- CONTENT -->
        <div class="content">

            <div class="topbar">
                <b>CONFIGURACIONES</b>
                <div id="userInfo"></div>
            </div>

            <div class="panel">
                <div class="grid">

                    <button class="btn" onclick="openM('cliente')">CLIENTE</button>
                    <button class="btn" onclick="openM('contacto')">CONTACTO</button>
                    <button class="btn" onclick="openM('sucursal')">SUCURSAL</button>
                    <button class="btn" onclick="openM('departamento')">DEPARTAMENTO</button>
                    <button class="btn" onclick="openM('ciudad')">CIUDAD</button>
                    <button class="btn" onclick="openM('whatsapp')">WHATSAPP</button>

                </div>
            </div>

        </div>
    </div>

    <!-- MODAL -->
    <div class="modal" id="modal">
        <div class="box">

            <div id="content"></div>

            <button onclick="save()" class="btn">GUARDAR</button>
            <button onclick="closeM()" class="btn">CERRAR</button>

        </div>
    </div>

    <script>

        /* ================= ESTADO SEPARADO (FIX LENTITUD) ================= */
        let timers = {
            cliente: null,
            contacto: null,
            sucursal: null
        };

        let cache = {};

        let current = null;

        document.getElementById("userInfo").innerText =
            (localStorage.getItem("user") || "") + " / " + (localStorage.getItem("rol") || "");


        /* ================= MODAL ================= */
        function openM(type) {

            current = type;
            document.getElementById("modal").style.display = "flex";

            if (type === "departamento") {
                document.getElementById("content").innerHTML = `
<h3>Departamento</h3>
<input id="dep_id" placeholder="ID">
<input id="dep_name" placeholder="Nombre">
`;
            }

            if (type === "ciudad") {
                document.getElementById("content").innerHTML = `
<h3>Ciudad</h3>
<input id="ciu_id" placeholder="Código">
<input id="dep_id_fk" placeholder="Depto ID">
<input id="ciu_name" placeholder="Municipio">
`;
            }

            if (type === "contacto" || type === "sucursal") {

                document.getElementById("content").innerHTML = `
<h3>${type}</h3>

<input id="search_${type}" placeholder="Buscar cliente" oninput="searchClient('${type}')">
<div id="res_${type}" class="search"></div>

<input id="cli_id_${type}" placeholder="Cliente ID" readonly>
<input id="nombre">
${type === "contacto" ? `
<input id="cargo">
<input id="telefono">
<input id="email">
`: `
<input id="ciudad">
<input id="direccion">
<input id="telefono">
`}
`;
            }
        }

        /* ================= SEARCH OPTIMIZADO ================= */
        function searchClient(type) {

            clearTimeout(timers[type]);

            timers[type] = setTimeout(async () => {

                const q = document.getElementById("search_" + type).value;

                if (q.length < 2) return;

                if (cache[type + "_" + q]) {
                    render(type, cache[type + "_" + q]);
                    return;
                }

                const r = await fetch("/api/clientes?search=" + q);
                const d = await r.json();

                cache[type + "_" + q] = d.data || [];

                render(type, d.data || []);

            }, 300);

        }

        function render(type, list) {

            let el = document.getElementById("res_" + type);
            el.innerHTML = "";

            list.forEach(c => {
                el.innerHTML += `
<div class="item" onclick="setCli('${type}','${c.id}')">
${c.cliente} - ${c.id}
</div>
`;
            });
        }

        function setCli(type, id) {

            document.getElementById("cli_id_" + type).value = id;
            document.getElementById("res_" + type).innerHTML = "";
        }

        /* ================= GUARDAR CON VALIDACIÓN REAL ================= */
        async function save() {

            let res;
            let body = {};

            if (current === "departamento") {

                body = {
                    id: dep_id.value,
                    depto: dep_name.value
                };

                res = await fetch("/api/departamentos", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(body)
                });

            }

            if (current === "ciudad") {

                body = {
                    id: ciu_id.value,
                    id_depto: dep_id_fk.value,
                    municipio: ciu_name.value
                };

                res = await fetch("/api/ciudades", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(body)
                });

            }

            if (current === "contacto") {

                body = {
                    cliente_id: cli_id_contacto.value,
                    nombre: nombre.value,
                    cargo: cargo.value,
                    telefono: telefono.value,
                    email: email.value
                };

                res = await fetch("/api/cliente_contactos", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(body)
                });

            }

            if (current === "sucursal") {

                body = {
                    cliente_id: cli_id_sucursal.value,
                    nombre: nombre.value,
                    ciudad: ciudad.value,
                    direccion: direccion.value,
                    telefono: telefono.value
                };

                res = await fetch("/api/cliente_sucursales", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(body)
                });

            }

            /* 🔥 VALIDACIÓN REAL */
            if (!res) {
                alert("ERROR: no se ejecutó petición");
                return;
            }

            let data = await res.json();

            if (!res.ok || data.error) {
                alert("ERROR: " + (data.message || "No guardado"));
                return;
            }

            alert("GUARDADO OK");
            closeM();

        }

        /* ================= CLOSE ================= */
        function closeM() {
            document.getElementById("modal").style.display = "none";
        }

    </script>

</body>

</html>
