<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM CONFIGURACIONES</title>

    <style>
        * {
            box-sizing: border-box
        }

        body {
            margin: 0;
            background: #0b1220;
            color: #fff;
            font-family: Arial;
        }

        .main {
            display: flex;
            height: 100vh
        }

        .sidebar {
            width: 220px;
            background: #0f172a;
            border-right: 1px solid #1e293b;
            padding: 12px;
        }

        .menu-item {
            padding: 10px;
            color: #cbd5e1;
            font-size: 13px;
            cursor: pointer;
            border-radius: 8px;
        }

        .menu-item:hover {
            background: #1e293b
        }

        .content {
            flex: 1;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .topbar {
            background: #111827;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #1e293b;
        }

        .panel {
            background: #111827;
            border: 1px solid #1e293b;
            border-radius: 12px;
            padding: 12px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }

        .btn {
            padding: 12px;
            background: #1e293b;
            border: 1px solid #334155;
            color: #fff;
            border-radius: 10px;
            cursor: pointer;
            font-size: 12px;
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .6);
            align-items: center;
            justify-content: center;
        }

        .box {
            width: 650px;
            background: #0f172a;
            border: 1px solid #1e293b;
            padding: 15px;
            border-radius: 10px;
        }

        label {
            font-size: 11px;
            color: #94a3b8;
        }

        input,
        textarea {
            width: 100%;
            padding: 8px;
            margin: 6px 0;
            background: #1e293b;
            border: 1px solid #334155;
            color: #fff;
            border-radius: 8px;
            font-size: 12px;
        }

        .search {
            max-height: 160px;
            overflow: auto;
            background: #1e293b;
            border-radius: 8px;
        }

        .item {
            padding: 8px;
            cursor: pointer;
            font-size: 12px;
        }

        .item:hover {
            background: #273449
        }

        .row {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <div class="main">

        <div class="sidebar">
            <div class="menu-item" onclick="location.href='index.html'">🏠 INICIO</div>
            <div class="menu-item" onclick="location.href='clientes.html'">👥 CLIENTES</div>
            <div class="menu-item" onclick="location.href='seguimientos.html'">📅 SEGUIMIENTOS</div>
            <div class="menu-item" onclick="location.href='llamadas.html'">📞 LLAMADAS</div>
            <div class="menu-item" onclick="location.href='cotizaciones.html'">📄 COTIZACIONES</div>
            <div class="menu-item" onclick="location.href='pedidos.html'">📦 PEDIDOS</div>
            <div class="menu-item" onclick="location.href='configuraciones.html'">⚙️ CONFIGURACIONES</div>
        </div>

        <div class="content">

            <div class="topbar"><b>CONFIGURACIONES</b></div>

            <div class="panel">
                <div class="grid">

                    <button class="btn" onclick="openModal('departamento')">DEPARTAMENTO</button>
                    <button class="btn" onclick="openModal('ciudad')">CIUDAD</button>
                    <button class="btn" onclick="openModal('contacto')">CONTACTO</button>
                    <button class="btn" onclick="openModal('sucursal')">SUCURSAL</button>
                    <button class="btn" onclick="openModal('whatsapp')">WHATSAPP</button>

                </div>
            </div>

        </div>
    </div>

    <!-- MODAL -->
    <div class="modal" id="modal">
        <div class="box">

            <div id="body"></div>

            <div class="row">
                <button class="btn" onclick="save()">GUARDAR</button>
                <button class="btn" onclick="closeModal()">CERRAR</button>
            </div>

        </div>
    </div>

    <script>

        let current = null;
        let debounce = {};
        let cache = {};

        /* =========================
           OPEN MODAL
        ========================= */

        function openModal(type) {

            current = type;

            const body = document.getElementById("body");
            document.getElementById("modal").style.display = "flex";

            if (type === "departamento") {
                body.innerHTML = `
<h3>Departamento</h3>
<label>ID</label>
<input id="dep_id">
<label>Nombre</label>
<input id="dep_name">
`;
            }

            if (type === "ciudad") {
                body.innerHTML = `
<h3>Ciudad</h3>
<label>Depto ID</label>
<input id="dep_id">
<label>Municipio</label>
<input id="ciu_name">
`;
            }

            if (type === "contacto" || type === "sucursal") {
                body.innerHTML = `
<h3>${type.toUpperCase()}</h3>

<label>Buscar cliente</label>
<input id="search" oninput="searchClient()">

<div id="res" class="search"></div>

<label>Cliente ID</label>
<input id="cli" readonly>

<label>Nombre</label>
<input id="nombre">

${type === "contacto" ? `
<label>Cargo</label><input id="cargo">
<label>Teléfono</label><input id="telefono">
<label>Email</label><input id="email">
` : `
<label>Ciudad</label><input id="ciudad">
<label>Dirección</label><input id="direccion">
<label>Teléfono</label><input id="telefono">
`}
`;
            }

            if (type === "whatsapp") {
                body.innerHTML = `
<h3>WhatsApp</h3>
<textarea id="msg"></textarea>
`;
            }
        }

        /* =========================
           SEARCH OPTIMIZADO REAL
        ========================= */

        async function searchClient() {

            clearTimeout(debounce.s);

            debounce.s = setTimeout(async () => {

                const q = document.getElementById("search").value.trim();

                if (q.length < 2) return;

                if (cache[q]) return render(cache[q]);

                try {

                    const r = await fetch("/api/clientes?search=" + encodeURIComponent(q));
                    const d = await r.json();

                    const list = d.data || [];

                    cache[q] = list;

                    render(list);

                } catch (e) {
                    console.log("error search");
                }

            }, 250);
        }

        function render(list) {

            const el = document.getElementById("res");
            if (!el) return;

            el.innerHTML = "";

            list.forEach(c => {

                el.innerHTML += `
<div class="item" onclick="selectClient('${c.id}','${c.cliente}')">
<b>${c.cliente}</b><br><small>${c.id}</small>
</div>
`;
            });
        }

        function selectClient(id, name) {

            document.getElementById("cli").value = id;
            document.getElementById("nombre").value = name;
            document.getElementById("res").innerHTML = "";
        }

        /* =========================
           SAVE
        ========================= */

        async function save() {

            try {

                let res;

                if (current === "departamento") {
                    res = await fetch("/api/departamentos", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            id: dep_id.value,
                            depto: dep_name.value
                        })
                    });
                }

                if (current === "ciudad") {
                    res = await fetch("/api/ciudades", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            id_depto: dep_id.value,
                            municipio: ciu_name.value
                        })
                    });
                }

                if (current === "contacto") {
                    res = await fetch("/api/cliente_contactos", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            cliente_id: cli.value,
                            nombre: nombre.value,
                            cargo: cargo.value,
                            telefono: telefono.value,
                            email: email.value
                        })
                    });
                }

                if (current === "sucursal") {
                    res = await fetch("/api/cliente_sucursales", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            cliente_id: cli.value,
                            nombre: nombre.value,
                            ciudad: ciudad.value,
                            direccion: direccion.value,
                            telefono: telefono.value
                        })
                    });
                }

                if (current === "whatsapp") {
                    localStorage.setItem("msg", document.getElementById("msg").value);
                    closeModal();
                    return;
                }

                const data = await res.json();

                if (!res.ok) {
                    alert(data.message || "ERROR");
                    return;
                }

                alert("GUARDADO OK");
                closeModal();

            } catch (e) {
                alert("ERROR DE CONEXIÓN");
            }
        }

        /* =========================
           CLOSE
        ========================= */

        function closeModal() {
            document.getElementById("modal").style.display = "none";
        }

    </script>

</body>

</html>
