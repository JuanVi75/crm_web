<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM CONFIGURACIONES</title>

    <style>
        * {
            box-sizing: border-box
        }

        body {
            margin: 0;
            background: #0b1220;
            color: #fff;
            font-family: Arial
        }

        .main-container {
            display: flex;
            height: 100vh
        }

        .sidebar {
            width: 220px;
            background: #0f172a;
            border-right: 1px solid #1e293b;
            padding: 12px
        }

        .logo {
            font-weight: bold;
            color: #60a5fa;
            margin-bottom: 15px
        }

        .menu-item {
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            color: #cbd5e1;
            font-size: 13px
        }

        .menu-item:hover {
            background: #1e293b
        }

        .content {
            flex: 1;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 14px
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #111827;
            border: 1px solid #1e293b;
            padding: 10px;
            border-radius: 10px
        }

        .panel {
            background: #111827;
            border: 1px solid #1e293b;
            border-radius: 12px;
            padding: 12px
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px
        }

        .btn {
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #334155;
            background: #1e293b;
            color: #fff;
            cursor: pointer;
            font-size: 12px
        }

        .btn:hover {
            background: #273449
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, .6);
            align-items: center;
            justify-content: center
        }

        .box {
            width: 600px;
            background: #0f172a;
            border: 1px solid #1e293b;
            padding: 15px;
            border-radius: 10px
        }

        label {
            font-size: 11px;
            color: #94a3b8
        }

        input,
        textarea {
            width: 100%;
            padding: 8px;
            margin: 6px 0;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #1e293b;
            color: #fff;
            font-size: 12px
        }

        .search {
            max-height: 160px;
            overflow: auto;
            background: #1e293b;
            border-radius: 8px
        }

        .item {
            padding: 8px;
            cursor: pointer;
            font-size: 12px
        }

        .item:hover {
            background: #273449
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px
        }
    </style>
</head>

<body>

    <div class="main-container">

        <!-- SIDEBAR OK -->
        <div class="sidebar">
            <div class="logo">CRM WEB</div>

            <div class="menu-item" onclick="location.href='index.html'">🏠 INICIO</div>
            <div class="menu-item" onclick="location.href='clientes.html'">👥 CLIENTES</div>
            <div class="menu-item" onclick="location.href='seguimientos.html'">📅 SEGUIMIENTOS</div>
            <div class="menu-item" onclick="location.href='llamadas.html'">📞 LLAMADAS</div>
            <div class="menu-item" onclick="location.href='cotizaciones.html'">📄 COTIZACIONES</div>
            <div class="menu-item" onclick="location.href='pedidos.html'">📦 PEDIDOS</div>
            <div class="menu-item" onclick="location.href='configuraciones.html'">⚙️ CONFIGURACIONES</div>

        </div>

        <!-- CONTENT -->
        <div class="content">

            <div class="topbar">
                <b>CONFIGURACIONES</b>
                <div id="userInfo"></div>
            </div>

            <div class="panel">
                <div class="grid">

                    <button class="btn" onclick="openM('cliente')">CLIENTE</button>
                    <button class="btn" onclick="openM('contacto')">CONTACTO</button>
                    <button class="btn" onclick="openM('sucursal')">SUCURSAL</button>
                    <button class="btn" onclick="openM('departamento')">DEPARTAMENTO</button>
                    <button class="btn" onclick="openM('ciudad')">CIUDAD</button>
                    <button class="btn" onclick="openM('whatsapp')">WHATSAPP</button>

                </div>
            </div>

        </div>
    </div>

    <!-- MODAL -->
    <div class="modal" id="modal">
        <div class="box">

            <div id="content"></div>

            <div class="modal-actions">
                <button class="btn" onclick="guardar()">GUARDAR</button>
                <button class="btn" onclick="closeM()">CERRAR</button>
            </div>

        </div>
    </div>

    <script>

        let current = null;
        let debounce = null;
        let cache = {};

        document.getElementById("userInfo").innerText =
            (localStorage.getItem("user") || "") + " / " + (localStorage.getItem("rol") || "");

        /* ================= OPEN ================= */
        function openM(type) {

            current = type;
            document.getElementById("modal").style.display = "flex";

            if (type === "departamento") {
                document.getElementById("content").innerHTML = `
<h3>Departamento</h3>
<label>ID</label>
<input id="dep_id">

<label>Nombre</label>
<input id="dep_name">
`;
            }

            if (type === "ciudad") {
                document.getElementById("content").innerHTML = `
<h3>Ciudad</h3>
<label>Código</label>
<input id="ciu_id">

<label>Departamento ID</label>
<input id="dep_fk">

<label>Municipio</label>
<input id="ciu_name">
`;
            }

            if (type === "contacto" || type === "sucursal") {

                document.getElementById("content").innerHTML = `
<h3>${type}</h3>

<label>Buscar cliente</label>
<input id="search_${type}" oninput="search('${type}')">

<div id="res_${type}" class="search"></div>

<label>Cliente ID</label>
<input id="cli_${type}" readonly>

<label>Nombre</label>
<input id="nombre">

${type === "contacto" ? `
<label>Cargo</label><input id="cargo">
<label>Teléfono</label><input id="telefono">
<label>Email</label><input id="email">
`: `
<label>Ciudad</label><input id="ciudad">
<label>Dirección</label><input id="direccion">
<label>Teléfono</label><input id="telefono">
`}
`;
            }

        }

        /* ================= SEARCH OPTIMIZADO ================= */
        function search(type) {

            clearTimeout(debounce);

            debounce = setTimeout(async () => {

                const q = document.getElementById("search_" + type).value.trim();
                if (q.length < 2) return;

                const key = type + "_" + q;

                if (cache[key]) {
                    render(type, cache[key]);
                    return;
                }

                const r = await fetch("/api/clientes?search=" + encodeURIComponent(q));
                const d = await r.json();

                cache[key] = d.data || [];

                render(type, d.data || []);

            }, 300);

        }

        function render(type, list) {

            const el = document.getElementById("res_" + type);
            el.innerHTML = "";

            list.forEach(c => {
                el.innerHTML += `
<div class="item" onclick="setCli('${type}','${c.id}','${c.cliente}')">
<b>${c.cliente}</b><br><small>${c.id}</small>
</div>
`;
            });

        }

        function setCli(type, id, name) {

            document.getElementById("cli_" + type).value = id;
            document.getElementById("nombre").value = name;
            document.getElementById("res_" + type).innerHTML = "";

        }

        /* ================= GUARDAR ================= */
        async function guardar() {

            let res;
            let body = {};

            if (current === "departamento") {
                body = { id: dep_id.value, depto: dep_name.value };

                res = await fetch("/api/departamentos", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(body)
                });
            }

            if (current === "ciudad") {
                body = { id: ciu_id.value, id_depto: dep_fk.value, municipio: ciu_name.value };

                res = await fetch("/api/ciudades", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(body)
                });
            }

            if (current === "contacto") {
                body = {
                    cliente_id: cli_contacto.value,
                    nombre: nombre.value,
                    cargo: cargo.value,
                    telefono: telefono.value,
                    email: email.value
                };

                res = await fetch("/api/cliente_contactos", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(body)
                });
            }

            if (current === "sucursal") {
                body = {
                    cliente_id: cli_sucursal.value,
                    nombre: nombre.value,
                    ciudad: ciudad.value,
                    direccion: direccion.value,
                    telefono: telefono.value
                };

                res = await fetch("/api/cliente_sucursales", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(body)
                });
            }

            if (current === "whatsapp") {
                localStorage.setItem("whatsapp_msg", document.getElementById("content").querySelector("textarea").value);
                closeM();
                return;
            }

            const data = await res.json();

            if (!res.ok || data.error) {
                alert(data.message || "ERROR");
                return;
            }

            alert("GUARDADO OK");
            closeM();

        }

        /* ================= CLOSE ================= */
        function closeM() {
            document.getElementById("modal").style.display = "none";
        }

    </script>

</body>

</html>
