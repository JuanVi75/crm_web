<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PEDIDOS - CRM WEB</title>

    <link rel="stylesheet" href="css/styles.css">

    <style>
        * {
            box-sizing: border-box
        }

        .main-container {
            display: flex;
            width: 100%;
            height: 100vh;
            overflow: hidden
        }

        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 14px;
            gap: 14px;
            overflow: hidden
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center
        }

        .page-title {
            font-size: 20px;
            font-weight: 600
        }

        .user-info {
            font-size: 11px;
            color: #94a3b8
        }

        .panel {
            background: #111827;
            border: 1px solid #1e293b;
            border-radius: 12px;
            padding: 12px
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 10px
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 4px
        }

        .field label {
            font-size: 11px;
            color: #94a3b8
        }

        .field input,
        .field select {
            background: #1e293b;
            border: 1px solid #334155;
            color: white;
            border-radius: 8px;
            padding: 8px;
            font-size: 11px
        }

        .actions {
            display: flex;
            gap: 8px;
            margin-top: 10px
        }

        .btn {
            height: 32px;
            padding: 0 14px;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer
        }

        .btn-primary {
            background: #2563eb
        }

        .btn-danger {
            background: #dc2626
        }

        .btn-secondary {
            background: #475569
        }

        .container {
            overflow-y: auto;
            flex: 1
        }

        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 10px;
            margin-bottom: 8px
        }

        .card-header {
            display: grid;
            grid-template-columns: 120px 1.5fr 120px 120px 120px 120px;
            gap: 8px;
            padding: 10px;
            font-size: 11px;
            cursor: pointer
        }

        .card-header:hover {
            background: #273449
        }
    </style>
</head>

<body>

    <div class="main-container">

        <!-- SIDEBAR -->
        <div class="sidebar">
            <div class="logo">CRM WEB</div>
            <div class="menu-item" onclick="location.href='index.html'">🏠 INICIO</div>
            <div class="menu-item" onclick="location.href='clientes.html'">👥 CLIENTES</div>
            <div class="menu-item" onclick="location.href='seguimientos.html'">📅 SEGUIMIENTOS</div>
            <div class="menu-item" onclick="location.href='cotizaciones.html'">📄 COTIZACIONES</div>
            <div class="menu-item">📦 PEDIDOS</div>
        </div>

        <!-- CONTENT -->
        <main class="content">

            <div class="topbar">
                <div class="page-title">Pedidos</div>
                <div class="user-info" id="userInfo"></div>
            </div>

            <!-- FORM -->
            <div class="panel">

                <div class="form-grid">

                    <!-- ✅ SELECT REAL -->
                    <div class="field">
                        <label>Cotización No.</label>
                        <select id="cotizacion_select" onchange="onSelectCotizacion()">
                            <option value="">-- Seleccionar cotización --</option>
                        </select>
                    </div>

                    <div class="field">
                        <label>Pedido No.</label>
                        <input id="pedido_numero" placeholder="260000XX">
                    </div>

                    <div class="field">
                        <label>Fecha</label>
                        <input id="fecha" type="date">
                    </div>

                    <div class="field">
                        <label>ID Cliente</label>
                        <input id="id_cliente">
                    </div>

                    <div class="field">
                        <label>Cliente</label>
                        <input id="cliente">
                    </div>

                    <div class="field">
                        <label>Cotización origen</label>
                        <input id="cot_no">
                    </div>

                    <div class="field">
                        <label>Total</label>
                        <input id="total">
                    </div>

                    <div class="field">
                        <label>Venta Neta</label>
                        <input id="venta_neta">
                    </div>

                    <div class="field">
                        <label>IVA</label>
                        <input id="iva">
                    </div>

                    <div class="field">
                        <label>Otros</label>
                        <input id="otros_imp">
                    </div>

                    <div class="field" id="asesorField">
                        <label>Asesor</label>
                        <input id="asesor">
                    </div>

                </div>

                <div class="actions">
                    <button class="btn btn-primary" onclick="guardarPedido()">GUARDAR</button>
                    <button class="btn btn-danger" onclick="eliminarPedido()">ELIMINAR</button>
                    <button class="btn btn-secondary" onclick="limpiar()">LIMPIAR</button>
                </div>

            </div>

            <!-- LIST -->
            <div class="panel container" id="pedidosContainer">Cargando...</div>

        </main>
    </div>

    <script>

        const API = "/api/pedidos"

        const user = localStorage.getItem("user") || "INVITADO"
        const rol = localStorage.getItem("rol") || "INVITADO"
        const isAsesor = rol === "ASESOR"

        userInfo.innerHTML = `${user}<br>${rol}`

        if (isAsesor) asesorField.style.display = "none"

        let pedidos = []
        let cotizacionesList = []

        /* ================= COTIZACIONES ================= */

        async function cargarCotizaciones() {

            const r = await fetch("/api/cotizaciones", {
                headers: { Authorization: "Bearer " + localStorage.getItem("token") }
            })

            const d = await r.json()
            cotizacionesList = d.data || []

            const select = document.getElementById("cotizacion_select")

            select.innerHTML = `
        <option value="">-- Seleccionar cotización --</option>
    ` + cotizacionesList.map(c => `
        <option value="${c.doc}">
            ${c.doc} / ${c.cliente}
        </option>
    `).join("")
        }

        /* ================= SELECT ================= */

        function onSelectCotizacion() {

            const doc = cotizacion_select.value
            const c = cotizacionesList.find(x => x.doc === doc)

            if (!c) return

            id_cliente.value = c.id_cliente
            cliente.value = c.cliente
            cot_no.value = c.doc

            total.value = c.total
            venta_neta.value = c.venta_neta
            iva.value = c.iva
            otros_imp.value = c.otros_imp || 0
            asesor.value = c.asesor || ""
        }

        /* ================= PEDIDOS ================= */

        async function cargarPedidos() {

            const r = await fetch(API, {
                headers: { Authorization: "Bearer " + localStorage.getItem("token") }
            })

            const d = await r.json()
            pedidos = d.data || []

            render()
        }

        function render() {

            pedidosContainer.innerHTML = ""

            pedidos.forEach(p => {

                pedidosContainer.innerHTML += `
        <div class="card" onclick="load('${p.doc}')">
            <div class="card-header">
                <div>${p.doc}</div>
                <div>${p.cliente}</div>
                <div>${p.fecha}</div>
                <div>${p.total}</div>
                <div>${p.venta_neta}</div>
                <div>${p.asesor}</div>
            </div>
        </div>`
            })
        }

        function load(doc) {

            const p = pedidos.find(x => x.doc === doc)
            if (!p) return

            pedido_numero.value = p.doc.replace("PD BOG ", "")
            fecha.value = (p.fecha || "").substring(0, 10)
            id_cliente.value = p.id_cliente
            cliente.value = p.cliente
            cot_no.value = p.cot_no
            total.value = p.total
            venta_neta.value = p.venta_neta
            iva.value = p.iva
            otros_imp.value = p.otros_imp
            asesor.value = p.asesor
        }

        /* ================= SAVE ================= */

        async function guardarPedido() {

            const body = {
                doc: "PD BOG " + pedido_numero.value.trim(),
                fecha: fecha.value,
                id_cliente: id_cliente.value,
                cliente: cliente.value,
                cot_no: cot_no.value,
                total: total.value,
                venta_neta: venta_neta.value,
                iva: iva.value,
                otros_imp: otros_imp.value,
                asesor: isAsesor ? user : asesor.value
            }

            await fetch(API, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    Authorization: "Bearer " + localStorage.getItem("token")
                },
                body: JSON.stringify(body)
            })

            limpiar()
            cargarPedidos()
        }

        /* ================= DELETE ================= */

        async function eliminarPedido() {

            const docVal = "PD BOG " + pedido_numero.value.trim()

            if (!pedido_numero.value) return alert("Seleccione pedido")

            await fetch(API + "/" + encodeURIComponent(docVal), {
                method: "DELETE",
                headers: { Authorization: "Bearer " + localStorage.getItem("token") }
            })

            limpiar()
            cargarPedidos()
        }

        /* ================= INIT ================= */

        window.onload = async () => {

            await cargarCotizaciones();
            await cargarPedidos();

            const base = localStorage.getItem("clientePedidoBase");
            const cot = localStorage.getItem("clientePedidoCotizacion");

            // 🔥 SI VIENE DESDE CLIENTES
            if (base) {
                const data = JSON.parse(base);

                id_cliente.value = data.id_cliente || "";
                cliente.value = data.cliente || "";

                localStorage.removeItem("clientePedidoBase");
            }

            // 🔥 SI VIENE CON COTIZACIÓN SELECCIONADA
            if (cot) {
                const c = JSON.parse(cot);

                cot_no.value = c.doc || "";
                id_cliente.value = c.id_cliente || "";
                cliente.value = c.cliente || "";

                total.value = c.total || "";
                venta_neta.value = c.venta_neta || "";
                iva.value = c.iva || "";
                otros_imp.value = c.otros_imp || 0;
                asesor.value = c.asesor || "";

                localStorage.removeItem("clientePedidoCotizacion");
            }
        };
        function limpiar() {
            pedido_numero.value = ""
            fecha.value = ""
            id_cliente.value = ""
            cliente.value = ""
            cot_no.value = ""
            total.value = ""
            venta_neta.value = ""
            iva.value = ""
            otros_imp.value = ""
            asesor.value = ""
            cotizacion_select.value = ""
        }

    </script>

</body>

</html>
