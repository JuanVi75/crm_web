<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Departamentos</title>

    <style>
        body {
            font-family: Arial;
            background: #0b1220;
            color: #fff;
            margin: 0;
            padding: 20px;
        }

        input {
            width: 200px;
            padding: 8px;
            margin-right: 5px;
            background: #1e293b;
            border: 1px solid #334155;
            color: #fff;
        }

        button {
            padding: 8px 12px;
            background: #1e293b;
            border: 1px solid #334155;
            color: #fff;
            cursor: pointer;
        }

        table {
            margin-top: 20px;
            width: 100%;
            border-collapse: collapse;
        }

        td,
        th {
            border: 1px solid #334155;
            padding: 8px;
        }

        th {
            background: #1e293b;
        }
    </style>
</head>

<body>

    <h2>Departamentos</h2>

    <input id="id" placeholder="ID">
    <input id="depto" placeholder="Departamento">
    <button onclick="guardar()">Guardar</button>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Departamento</th>
            </tr>
        </thead>
        <tbody id="tbody"></tbody>
    </table>

    <script src="js/departamentos.js"></script>

</body>

</html>
