<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM WEB - SEGUIMIENTOS</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        * {
            box-sizing: border-box
        }

        .modal-reporte {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 99999;
        }

        .modal-reporte-box {
            width: 420px;
            background: #111827;
            border: 1px solid #334155;
            border-radius: 14px;
            padding: 18px;
        }

        .modal-reporte-title {
            color: #60a5fa;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 16px;
            text-align: center;
        }

        .modal-reporte-actions {
            display: flex;
            gap: 10px;
            margin-top: 18px;
        }

        .modal-reporte-actions .btn {
            flex: 1;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .modal-box {
            width: 380px;
            background: #111827;
            border: 1px solid #1e293b;
            border-radius: 14px;
            padding: 18px;
        }

        .modal-title {
            text-align: center;
            color: #60a5fa;
            font-weight: bold;
            margin-bottom: 12px;
        }

        .modal-cliente {
            text-align: center;
            font-size: 16px;
            font-weight: bold;
        }

        .modal-id {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 16px;
        }

        .modal-actions {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .modal-actions .btn {
            width: 100%;
        }

        .content {
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 14px
        }

        .panel {
            background: #111827;
            border: 1px solid #1e293b;
            border-radius: 14px;
            padding: 12px
        }

        .filters-grid,
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 10px
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 4px
        }

        .field label {
            font-size: 11px;
            color: #94a3b8
        }

        .field input,
        .field select,
        .field textarea {
            background: #1e293b;
            border: 1px solid #334155;
            color: white;
            border-radius: 8px;
            padding: 8px;
            font-size: 11px;
            width: 100%;
        }

        .field textarea {
            min-height: 15px
        }

        .actions {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 12px
        }

        .pagination {
            margin-left: auto;
            display: flex;
            gap: 10px;
            align-items: center
        }

        .btn {
            height: 32px;
            padding: 0 14px;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer
        }

        .btn-primary {
            background: #2563eb
        }

        .btn-warning {
            background: #d97706
        }

        .btn-danger {
            background: #dc2626
        }

        .btn-secondary {
            background: #475569
        }

        .btn-emerald {
            background: #059669;
        }

        .table-panel {
            flex: 1
        }

        .table-head,
        .row {
            display: grid;
            grid-template-columns: 80px 2fr 1fr 1fr 1fr 1fr 1fr;
            gap: 8px;
            padding: 10px;
            font-size: 11px
        }

        .table-head {
            background: #0f172a;
            color: #60a5fa;
            font-weight: bold
        }

        .card {
            border: 1px solid #334155;
            border-radius: 10px;
            margin-top: 8px;
            overflow: hidden
        }

        .row {
            background: #1e293b;
            cursor: pointer
        }

        .detail {
            display: none;
            padding: 10px;
            background: #16202f;
            font-size: 11px;
        }

        .detail.active {
            display: block
        }
    </style>
</head>

<body>
    <div class="main-container">
        <div class="sidebar">
            <div class="logo">CRM WEB</div>

            <div class="menu-item" onclick="window.location.href='index.html'">
                🏠 INICIO
            </div>
            <div class="menu-item" onclick="window.location.href='clientes.html'">
                👥 CLIENTES
            </div>
            <div class="menu-item" onclick="window.location.href='seguimientos.html'">
                📅 SEGUIMIENTOS
            </div>
            <div class="menu-item" onclick="window.location.href='llamadas.html'">
                📞 LLAMADAS
            </div>
            <div class="menu-item" onclick="window.location.href='cotizaciones.html'">
                📄 COTIZACIONES
            </div>
            <div class="menu-item" onclick="window.location.href='pedidos.html'">
                📦 PEDIDOS
            </div>
        </div>

        <main class="content">
            <div class="topbar">
                <div class="page-title">Seguimientos</div>
                <div class="user-info" id="userInfo"></div>

            </div>

            <!-- FILTROS -->
            <div class="panel">

                <div class="filters-grid">

                    <div class="field">
                        <label>Ciudad</label>
                        <select id="filterCiudad">
                            <option value="">TODAS</option>
                        </select>
                    </div>

                    <div class="field">
                        <label>Sector</label>
                        <select id="filterSector">
                            <option value="">TODAS</option>
                        </select>
                    </div>

                    <div class="field" id="asesorFilterBox">
                        <label>Asesor</label>
                        <select id="filterAsesor">
                            <option value="">TODOS</option>
                        </select>
                    </div>

                </div>

            </div>

            <!-- FORMULARIO -->
            <div class="panel">

                <div class="form-grid">

                    <!-- DATOS QUE VIENEN DE CLIENTES -->

                    <div class="field">
                        <label>Fecha</label>
                        <input id="fecha" type="date">
                    </div>

                    <div class="field">
                        <label>ID Cliente</label>
                        <input id="cliente_id" readonly>
                    </div>

                    <div class="field">
                        <label>Cliente</label>
                        <input id="cliente_nombre" readonly>
                    </div>

                    <div class="field">
                        <label>Contacto</label>
                        <input id="contacto">
                    </div>

                    <div class="field">
                        <label>Teléfono</label>
                        <input id="tel_contacto">
                    </div>

                    <!-- DATOS DEL SEGUIMIENTO -->

                    <div class="field">
                        <label>Tipo</label>
                        <select id="tipo">
                            <option>LLAMADA</option>
                            <option>WHATSAPP</option>
                            <option>VISITA</option>
                            <option>EMAIL</option>
                            <option>COTIZACION</option>
                            <option>OTRO</option>
                        </select>
                    </div>

                    <div class="field">
                        <label>Fecha Próxima</label>
                        <input type="date" id="fecha_proxima">
                    </div>

                    <div class="field">
                        <label>Próxima Acción</label>
                        <input id="proxima_accion">
                    </div>

                    <div class="field" style="grid-column:1/-1">
                        <label>Nota</label>
                        <textarea id="nota"></textarea>
                    </div>

                </div>

                <div class="actions">

                    <button class="btn btn-primary" onclick="guardarSeguimiento()">
                        AGREGAR
                    </button>

                    <button class="btn btn-warning" onclick="modificarSeguimiento()">
                        MODIFICAR
                    </button>

                    <button class="btn btn-danger" onclick="eliminarSeguimiento()">
                        ELIMINAR
                    </button>

                    <button class="btn btn-secondary" onclick="limpiar()">
                        LIMPIAR
                    </button>

                    <button class="btn btn-emerald" onclick="abrirModalReporte()">
                        📄 REPORTE
                    </button>

                    <div class="pagination">

                        <button>
                            ❮
                        </button>

                        <span id="pageInfo">
                            1 / 1
                        </span>

                        <button>
                            ❯
                        </button>

                    </div>

                </div>

            </div>

            <div class="panel table-panel">

                <div class="table-head">
                    <div>FECHA</div>
                    <div>CLIENTE</div>
                    <div>CONTACTO</div>
                    <div>TEL CONTACTO</div>
                    <div>PRÓXIMO SEG.</div>
                </div>

                <div id="tabla"></div>

            </div>
        </main>
    </div>

    <script>
        const API = "/api/seguimientos";
        const API_CLIENTES = "/api/clientes";
        const user =
            localStorage.getItem("user") || "INVITADO";
        const rol =
            localStorage.getItem("rol") || "INVITADO";

        document.getElementById("userInfo").innerHTML =
            `
                ${user}<br>${rol}
        `;

        let clienteAccionId = "";
        let clienteAccionNombre = "";
        let clienteAccionContacto = "";
        let clienteAccionTelefono = "";

        document.getElementById("filterCiudad").addEventListener("change", aplicarFiltros);
        document.getElementById("filterSector").addEventListener("change", aplicarFiltros);
        document.getElementById("filterAsesor").addEventListener("change", aplicarFiltros);

        async function cargarClientes() {
            const r = await fetch(API_CLIENTES + "?page=1&limit=1000", {
                headers: { Authorization: "Bearer " + localStorage.getItem("token") }
            });
            const d = await r.json();
            const sel = document.getElementById("cliente_id");
            sel.innerHTML = '<option value="">Seleccione...</option>';
            (d.data || []).forEach(c => {
                sel.innerHTML += `<option value="${c.id}" data-contacto="${c.contacto || ''}" data-tel="${c.tel_contacto || ''}">${c.cliente}</option>`;
            });
        }

        document.getElementById("cliente_id").addEventListener("change", e => {
            const o = e.target.selectedOptions[0];
            contacto.value = o.dataset.contacto || "";
            tel_contacto.value = o.dataset.tel || "";
        });

        function limpiar() {
            cliente_id.value = "";
            cliente_nombre.value = "";
            contacto.value = "";
            tel_contacto.value = "";
            tipo.value = "LLAMADA";
            nota.value = "";
            proxima_accion.value = "";
            fecha_proxima.value = "";
            window.idSeguimientoActual = null;
            setFechaHoy();
        }

        cargarClientes();

        const c =
            JSON.parse(
                localStorage.getItem(
                    "clienteSeguimiento"
                )
            );

        if (c) {

            cliente_id.value = c.id;

            contacto.value = c.contacto;

            tel_contacto.value = c.telefono;
        }

        const params =
            new URLSearchParams(window.location.search);

        const clienteId =
            params.get("cliente");

        const cliente =
            JSON.parse(
                localStorage.getItem("clienteSeguimiento")
            );

        if (cliente) {

            cliente_id.value =
                cliente.id || "";

            cliente_nombre.value =
                cliente.cliente || "";

            contacto.value =
                cliente.contacto || "";

            tel_contacto.value =
                cliente.telefono || "";
        }

        window.addEventListener("load", () => {

            const nav =
                performance.getEntriesByType("navigation")[0];

            if (nav && nav.type === "reload") {

                limpiar();

                localStorage.removeItem(
                    "clienteSeguimiento"
                );
            }
        });

        function aplicarFiltros() {

            const ciudadFiltro = document.getElementById("filterCiudad").value.toLowerCase().trim();
            const sectorFiltro = document.getElementById("filterSector").value.toLowerCase().trim();
            const asesorFiltro = document.getElementById("filterAsesor").value.toLowerCase().trim();

            const filtrados = seguimientos.filter(s => {

                const okCiudad =
                    !ciudadFiltro ||
                    (s.ciudad || "").toLowerCase().includes(ciudadFiltro);

                const okSector =
                    !sectorFiltro ||
                    (s.sector || "").toLowerCase().includes(sectorFiltro);

                const okAsesor =
                    !asesorFiltro ||
                    (s.asesor || "").toLowerCase().includes(asesorFiltro);

                return okCiudad && okSector && okAsesor;
            });

            renderSeguimientos(filtrados);
        }

        // =========================================
        // GLOBAL
        // =========================================
        let seguimientos = [];

        // =========================================
        // EVENTOS FILTROS
        // =========================================

        const filtroCliente =
            document.getElementById("fCliente");

        if (filtroCliente) {
            filtroCliente.addEventListener(
                "input",
                aplicarFiltros
            );
        }

        const filtroTipo =
            document.getElementById("fTipo");

        if (filtroTipo) {
            filtroTipo.addEventListener(
                "input",
                aplicarFiltros
            );
        }

        const filtroAsesor =
            document.getElementById("fAsesor");

        if (filtroAsesor) {
            filtroAsesor.addEventListener(
                "input",
                aplicarFiltros
            );
        }


        window.addEventListener("load", () => {

            const nav =
                performance.getEntriesByType("navigation")[0];

            if (nav && nav.type === "reload") {

                limpiar();

                localStorage.removeItem(
                    "clienteSeguimiento"
                );
            }
        });
        // =========================================
        // AGREGAR
        // =========================================
        async function guardarSeguimiento() {

            const body = {

                fecha:
                    fecha.value || new Date().toISOString().split("T")[0],

                cliente_id:
                    cliente_id.value,

                tipo:
                    tipo.value,

                nota:
                    nota.value,

                proxima_accion:
                    proxima_accion.value,

                fecha_proxima:
                    fecha_proxima.value || null,

                asesor:
                    user
            };

            const res = await fetch(
                API,
                {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        Authorization:
                            "Bearer " +
                            localStorage.getItem("token")
                    },
                    body: JSON.stringify(body)
                }
            );

            const data =
                await res.json();

            alert(
                data.message ||
                "Seguimiento creado"
            );

            limpiar();

            cargarSeguimientos();
        }

        // =========================================
        // MODIFICAR
        // =========================================
        async function modificarSeguimiento() {

            if (!window.idSeguimientoActual) {

                alert("Debe cargar un seguimiento");

                return;
            }

            const body = {

                fecha:
                    fecha.value || new Date().toISOString().split("T")[0],

                tipo:
                    tipo.value,

                nota:
                    nota.value,

                proxima_accion:
                    proxima_accion.value,

                fecha_proxima:
                    fecha_proxima.value || null
            };

            const res = await fetch(
                API + "/" + window.idSeguimientoActual,
                {
                    method: "PUT",
                    headers: {
                        "Content-Type": "application/json",
                        Authorization:
                            "Bearer " +
                            localStorage.getItem("token")
                    },
                    body: JSON.stringify(body)
                }
            );

            const data =
                await res.json();

            alert(
                data.message ||
                "Seguimiento actualizado"
            );

            cargarSeguimientos();
        }

        // =========================================
        // ELIMINAR
        // =========================================
        async function eliminarSeguimiento() {

            if (!id.value) {

                alert(
                    "Debe cargar un seguimiento"
                );

                return;
            }

            if (
                !confirm(
                    "¿Eliminar seguimiento?"
                )
            ) {
                return;
            }

            const res = await fetch(
                API + "/" + id.value,
                {
                    method: "DELETE",
                    headers: {
                        Authorization:
                            "Bearer " +
                            localStorage.getItem("token")
                    }
                }
            );

            const data =
                await res.json();

            alert(
                data.message ||
                "Seguimiento eliminado"
            );

            limpiar();

            cargarSeguimientos();
        }

        function renderSeguimientos(datos) {

            const tabla =
                document.getElementById("tabla");

            tabla.innerHTML = "";

            datos.forEach(s => {

                tabla.innerHTML += `

            <div class="card">

                <div
                    class="row"
                    onclick="toggleDetalle(${s.id})">

                    <div>
                        ${s.fecha
                        ? s.fecha.substring(0, 10)
                        : ""}
                    </div>

                <div>
                    ${s.cliente || ""}
                </div>

                <div>
                    ${s.contacto || ""}
                </div>

                <div>
                    ${s.tel_contacto || ""}
                </div>

                <div>
                    ${s.fecha_proxima
                        ? s.fecha_proxima.substring(0, 10)
                        : ""}
                </div>

            </div>

            <div
                class="detail"
                id="detail${s.id}">

                <p>
                    <b>Tipo:</b>
                    ${s.tipo || ""}
                </p>

                <br>

                <p>
                    <b>Nota:</b><br>
                    ${s.nota || ""}
                </p>

                <br>

                <p>
                    <b>Próxima Acción:</b><br>
                    ${s.proxima_accion || ""}
                </p>

                <br>

                <p>
                    <b>Asesor:</b>
                    ${s.asesor || ""}
                </p>

                <br>

                <button
                    class="btn btn-primary"
                    onclick="
                        event.stopPropagation();
                        abrirAccionesCliente(
                            '${s.cliente_id}',
                            '${s.cliente}',
                            '${s.contacto || ""}',
                            '${s.tel_contacto || ""}'
                        );
                    ">
                    CARGAR CLIENTE
                </button>

                <button
                    class="btn btn-warning"
                    onclick="
                        event.stopPropagation();
                        cargarSeguimiento(${s.id});
                    ">
                    EDITAR
                </button>

            </div>

        </div>

        `;
            });
        }

        async function cargarSeguimientos() {

            const res = await fetch(
                API,
                {
                    headers: {
                        Authorization:
                            "Bearer " +
                            localStorage.getItem("token")
                    }
                }
            );

            const data =
                await res.json();

            seguimientos =
                data.data || [];

            console.log(seguimientos[0]);

            renderSeguimientos(
                seguimientos
            );

            llenarFiltros(seguimientos);
        }
        function llenarFiltros(data) {

            const ciudades = [...new Set(data.map(s => s.ciudad).filter(Boolean))];
            const sectores = [...new Set(data.map(s => s.sector).filter(Boolean))];
            const asesores = [...new Set(data.map(s => s.asesor).filter(Boolean))];

            const ciudadSel = document.getElementById("filterCiudad");
            const sectorSel = document.getElementById("filterSector");
            const asesorSel = document.getElementById("filterAsesor");

            ciudades.forEach(c => {
                ciudadSel.innerHTML += `<option value="${c}">${c}</option>`;
            });

            sectores.forEach(s => {
                sectorSel.innerHTML += `<option value="${s}">${s}</option>`;
            });

            asesores.forEach(a => {
                asesorSel.innerHTML += `<option value="${a}">${a}</option>`;
            });
        }

        window.onload = async () => {
            setFechaHoy();
            await cargarClientes();
            await cargarSeguimientos();
        }

        async function cargarSeguimiento(idSeguimiento) {

            const res = await fetch(
                API + "/" + idSeguimiento,
                {
                    headers: {
                        Authorization:
                            "Bearer " +
                            localStorage.getItem("token")
                    }
                }
            );

            const s = await res.json();

            if (!s) {
                alert("Seguimiento no encontrado");
                return;
            }

            window.idSeguimientoActual = s.id;

            cliente_id.value =
                s.cliente_id || "";

            cliente_nombre.value =
                s.cliente || "";

            contacto.value =
                s.contacto || "";

            tel_contacto.value =
                s.tel_contacto || "";

            tipo.value =
                s.tipo || "LLAMADA";

            nota.value =
                s.nota || "";

            proxima_accion.value =
                s.proxima_accion || "";

            fecha_proxima.value =
                s.fecha_proxima
                    ? s.fecha_proxima.substring(0, 10)
                    : "";

            fecha.value =
                s.fecha
                    ? s.fecha.substring(0, 10)
                    : new Date().toISOString().split("T")[0];

            llenarFiltros(seguimientos);
        }

        function toggleDetalle(id) {

            document
                .getElementById(
                    "detail" + id
                )
                .classList
                .toggle("active");
        }

        function cargarCliente(idCliente) {

            window.location.href =
                "seguimientos.html?cliente=" +
                idCliente;
        }

        function abrirAccionesCliente(
            idCliente,
            nombreCliente,
            contactoCliente,
            telefonoCliente
        ) {

            clienteAccionId =
                idCliente;

            clienteAccionNombre =
                nombreCliente;

            clienteAccionContacto =
                contactoCliente;

            clienteAccionTelefono =
                telefonoCliente;

            document.getElementById(
                "modalClienteNombre"
            ).textContent =
                nombreCliente;

            document.getElementById(
                "modalClienteId"
            ).textContent =
                idCliente;

            document.getElementById(
                "modalCliente"
            ).style.display =
                "flex";
        }

        function cerrarModalCliente() {

            document.getElementById(
                "modalCliente"
            ).style.display =
                "none";
        }

        function mostrarFicha() {

            window.location.href =
                "ficha_cliente.html?cliente=" +
                clienteAccionId;
        }

        function nuevoSeguimiento() {

            cerrarModalCliente();

            cliente_id.value =
                clienteAccionId;

            cliente_nombre.value =
                clienteAccionNombre;

            contacto.value =
                clienteAccionContacto;

            tel_contacto.value =
                clienteAccionTelefono;

        }

        function llenarFiltros(data) {

            const ciudades = [...new Set(data.map(s => s.ciudad).filter(Boolean))];
            const sectores = [...new Set(data.map(s => s.sector).filter(Boolean))];
            const asesores = [...new Set(data.map(s => s.asesor).filter(Boolean))];

            const ciudadSel = document.getElementById("filterCiudad");
            const sectorSel = document.getElementById("filterSector");
            const asesorSel = document.getElementById("filterAsesor");

            ciudades.forEach(c => {
                ciudadSel.innerHTML += `<option value="${c}">${c}</option>`;
            });

            sectores.forEach(s => {
                sectorSel.innerHTML += `<option value="${s}">${s}</option>`;
            });

            asesores.forEach(a => {
                asesorSel.innerHTML += `<option value="${a}">${a}</option>`;
            });
        }

        window.addEventListener("load", () => {

            if (rol === "ASESOR") {
                const box = document.getElementById("asesorFilterBox");
                if (box) {
                    box.style.display = "none";
                }
            }
        });

        function setFechaHoy() {
            const hoy =
                new Date()
                    .toISOString()
                    .split("T")[0];

            fecha.value = hoy;
        }

        function abrirModalReporte() {

            document.getElementById("modalReporte").style.display = "flex";

            const hoy = new Date().toISOString().split("T")[0];

            document.getElementById("fechaInicioReporte").value = hoy;

            document.getElementById("fechaFinReporte").value = hoy;
        }

        function cerrarModalReporte() {

            document.getElementById("modalReporte").style.display = "none";
        }

        async function generarReporte() {

            const fechaInicio =
                document.getElementById("fechaInicioReporte").value;

            const fechaFin =
                document.getElementById("fechaFinReporte").value;

                return;

            // SEGUIMIENTOS
            // =========================================

                {
                    headers: {
                        Authorization:
                            "Bearer " +
                            localStorage.getItem("token")
                    }
                }
            );

            const dataSeguimientos =
                await resSeguimientos.json();

            if (!dataSeguimientos.success) {
                alert("Error generando reporte");
                return;
            }

            // =========================================
            // COTIZACIONES
            // =========================================

            const resCotizaciones = await fetch(
                `/api/cotizaciones`,
                {
                    headers: {
                        Authorization:
                            "Bearer " +
                            localStorage.getItem("token")
                    }
                }
            );

            const dataCotizaciones =
                await resCotizaciones.json();

            // =========================================
            // PEDIDOS
            // =========================================

            const resPedidos = await fetch(
                `/api/pedidos`,
                {
                    headers: {
                        Authorization:
                            "Bearer " +
                            localStorage.getItem("token")
                    }
                }
            );

            const dataPedidos =
                await resPedidos.json();

            const usuario =
                localStorage.getItem("user") || "INVITADO";

            const rol =
                localStorage.getItem("rol") || "INVITADO";

            // =========================================
            // FILTRAR COTIZACIONES
            // =========================================

            let cotizaciones =
                dataCotizaciones.data || [];

            cotizaciones = cotizaciones.filter(c => {

                const fecha =
                    c.fecha
                        ? c.fecha.substring(0, 10)
                        : "";

                const cumpleFecha =
                    fecha >= fechaInicio &&
                    fecha <= fechaFin;

                const cumpleUsuario =
                    rol === "ADMIN" ||
                    c.asesor === usuario;

                return cumpleFecha &&
                    cumpleUsuario;
            });

            cotizaciones.sort((a, b) => {
                return (b.doc || "").localeCompare(a.doc || "");
            });


            // =========================================
            // FILTRAR PEDIDOS
            // =========================================

            let pedidos =
                dataPedidos.data || [];

            pedidos = pedidos.filter(p => {

                //          pedidos.sort((a, b) => {
                //            return (b.doc || "").localeCompare(a.doc || "");
                //      });

                const fecha =
                    p.fecha
                        ? p.fecha.substring(0, 10)
                        : "";

                const cumpleFecha =
                    fecha >= fechaInicio &&
                    fecha <= fechaFin;

                const cumpleUsuario =
                    rol === "ADMIN" ||
                    p.asesor === usuario;

                return cumpleFecha &&
                    cumpleUsuario;
            });

            // =========================================
            // TOTALES
            // =========================================

            const totalCotizaciones =
                cotizaciones.reduce(
                    (acc, c) =>
                        acc + Number(c.venta_neta || 0),
                    0
                );

            const totalPedidos =
                pedidos.reduce(
                    (acc, p) =>
                        acc + Number(p.venta_neta || 0),
                    0
                );

</tr>`;
            });

            // =========================================

                window.open("", "_blank");

            ventana.document.write(`
