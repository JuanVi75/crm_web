<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>COMISIONES - CRM WEB</title>

    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            margin: 0;
        }

        .main-container {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 14px;
            padding: 14px;
            height: 100vh;
            overflow: hidden;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex: 0 0 auto;
        }

        .page-title {
            font-size: 22px;
            font-weight: 600;
        }

        .user-info {
            font-size: 11px;
            color: #94a3b8;
            text-align: right;
        }

        /* =========================
           FILTROS Y KPI FIJOS
        ========================= */

        .panel {
            background: #111827;
            border: 1px solid #243244;
            border-radius: 12px;
            padding: 14px;
            flex: 0 0 auto;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            align-items: end;
        }

        .actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            align-items: end;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .field label {
            font-size: 11px;
            color: #94a3b8;
        }

        .field input,
        .field select {
            height: 34px;
            border: none;
            outline: none;
            border-radius: 8px;
            background: #1e293b;
            color: white;
            padding: 0 10px;
        }

        .btn {
            height: 34px;
            padding: 0 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            color: #fff;
        }

        .btn-primary {
            background: #2563eb;
        }

        .btn-secondary {
            background: #475569;
        }

        .btn-danger {
            background: #dc2626;
        }

        .kpis {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            flex: 0 0 auto;
        }

        .kpi {
            background: #1e293b;
            border-radius: 10px;
            border-left: 5px solid #3b82f6;
            padding: 12px;
        }

        .kpi-title {
            color: #94a3b8;
            font-size: 11px;
        }

        .kpi-value {
            font-size: 16px;
            font-weight: bold;
        }

        /* =========================
           TABS (CLAVE DEL SCROLL)
        ========================= */

        .tabs {
            display: flex;
            gap: 2px;
            flex: 0 0 auto;
        }

        .tab {
            padding: 12px 25px;
            cursor: pointer;
            background: #1e293b;
            color: #94a3b8;
            border-radius: 10px 10px 0 0;
            user-select: none;
        }

        .tab.active {
            background: #2563eb;
            color: #fff;
        }

        /* CONTENEDOR TABS */
        .tabs-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            /* 🔥 CRÍTICO */
            overflow: hidden;
        }

        .tab-content {
            display: none;
            flex: 1;
            min-height: 0;
            /* 🔥 CRÍTICO */
        }

        .tab-content.active {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 0;
        }

        /* TABLAS CON SCROLL */
        .table-header {
            display: grid;
            gap: 8px;
            padding: 10px;
            background: #0f172a;
            border-radius: 8px;
            font-weight: bold;
            font-size: 11px;
            flex: 0 0 auto;
        }

        .table-body {
            flex: 1;
            overflow-y: auto;
            min-height: 0;
            /* 🔥 ESTE ES EL SCROLL REAL */
        }

        .footer-total {
            margin-top: 12px;
            background: #0f172a;
            border-radius: 8px;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            font-weight: bold;
            flex: 0 0 auto;
        }
    </style>
</head>

<body>

    <div class="main-container">

        <div class="sidebar">
            <div class="logo">CRM WEB</div>
            <div class="menu-item">🏠 INICIO</div>
            <div class="menu-item">👥 CLIENTES</div>
            <div class="menu-item">📅 SEGUIMIENTOS</div>
            <div class="menu-item">📞 LLAMADAS</div>
            <div class="menu-item">📄 COTIZACIONES</div>
            <div class="menu-item">📦 PEDIDOS</div>
            <div class="menu-item active">💰 COMISIONES</div>
        </div>

        <main class="content">

            <div class="topbar">
                <div class="page-title">Comisiones</div>
                <div class="user-info"></div>
            </div>

            <!-- FILTROS -->
            <div class="panel">
                <div class="form-grid">
                    <div class="field">
                        <label>Fecha Inicial Pedidos</label>
                        <input type="date" id="fechaInicioPedidos">
                    </div>

                    <div class="field">
                        <label>Fecha Final Pedidos</label>
                        <input type="date" id="fechaFinPedidos">
                    </div>

                    <div class="field">
                        <label>Fecha Inicial Cotizaciones</label>
                        <input type="date" id="fechaInicioCot">
                    </div>

                    <div class="field">
                        <label>Fecha Final Cotizaciones</label>
                        <input type="date" id="fechaFinCot">
                    </div>

                    <div class="field">
                        <label>Asesor</label>
                        <select id="asesorFiltro">
                            <option value="">TODOS</option>
                        </select>
                    </div>

                    <div class="actions">
                        <button class="btn btn-primary">CONSULTAR</button>
                        <button class="btn btn-secondary">MARCAR TODAS</button>
                        <button class="btn btn-danger">LIMPIAR</button>
                    </div>
                </div>
            </div>

            <!-- KPI -->
            <div class="kpis">
                <div class="kpi">
                    <div class="kpi-title">VENTA REAL</div>
                    <div class="kpi-value">$0</div>
                </div>
                <div class="kpi">
                    <div class="kpi-title">COMISIÓN REAL</div>
                    <div class="kpi-value">$0</div>
                </div>
                <div class="kpi">
                    <div class="kpi-title">PROYECCIÓN</div>
                    <div class="kpi-value">$0</div>
                </div>
                <div class="kpi">
                    <div class="kpi-title">COMISIÓN PROYECTADA</div>
                    <div class="kpi-value">$0</div>
                </div>
            </div>

            <!-- TABS -->
            <div class="panel tabs-wrapper">

                <div class="tabs">
                    <div class="tab active">📦 Pedidos</div>
                    <div class="tab">📄 Proyección</div>
                    <div class="tab">📊 Resumen</div>
                </div>

                <!-- TAB 1 -->
                <div class="tab-content active">

                    <div class="table-header" style="grid-template-columns:120px 110px 1fr 120px 120px;">
                        <div>Doc</div>
                        <div>Fecha</div>
                        <div>Cliente</div>
                        <div>Venta</div>
                        <div>Comisión</div>
                    </div>

                    <div class="table-body"></div>

                </div>

                <!-- TAB 2 -->
                <div class="tab-content">

                    <div class="table-header" style="grid-template-columns:120px 110px 1fr 120px 120px;">
                        <div>Doc</div>
                        <div>Fecha</div>
                        <div>Cliente</div>
                        <div>Venta</div>
                        <div>Comisión</div>
                    </div>

                    <div class="table-body"></div>

                </div>

                <!-- TAB 3 -->
                <div class="tab-content">
                    <div class="table-body"></div>
                </div>

            </div>

        </main>

    </div>

</body>

<script>

    function cambiarTab(i) {

        document
            .querySelectorAll(".tab")
            .forEach(x => x.classList.remove("active"));

        document
            .querySelectorAll(".tab-content")
            .forEach(x => x.classList.remove("active"));

        document
            .querySelectorAll(".tab")[i]
            .classList.add("active");

        document
            .querySelectorAll(".tab-content")[i]
            .classList.add("active");

    }

    const API_PEDIDOS = "/api/pedidos";
    const API_COTIZACIONES = "/api/cotizaciones";

    const TOKEN = localStorage.getItem("token");

    const USER = localStorage.getItem("user") || "";
    const ROL = localStorage.getItem("rol") || "";

    let pedidos = [];
    let cotizaciones = [];

    userInfo.innerHTML = USER + "<br>" + ROL;

    if (ROL === "ASESOR") {
        boxAsesor.style.display = "none";
    }

    function money(v) {
        return Number(v || 0).toLocaleString("es-CO", {
            style: "currency",
            currency: "COP",
            minimumFractionDigits: 0
        });
    }

    function num(v) {
        return Number(v) || 0;
    }

    function fechaSQL(f) {
        return String(f).substring(0, 10);
    }

    function fechaHoy() {

        const h1 = new Date();
        fechaFinPedidos.value = h1.toISOString().substring(0, 10);

        const h2 = new Date();
        h2.setMonth(h2.getMonth() - 1);
        fechaInicioPedidos.value = h2.toISOString().substring(0, 10);

        const c1 = new Date();
        fechaFinCot.value = c1.toISOString().substring(0, 10);

        const c2 = new Date();
        c2.setMonth(c2.getMonth() - 1);
        fechaInicioCot.value = c2.toISOString().substring(0, 10);
    }

    async function consultar() {

        const paramsPedidos = new URLSearchParams();
        const paramsCot = new URLSearchParams();

        paramsPedidos.append("desde", fechaInicioPedidos.value);
        paramsPedidos.append("hasta", fechaFinPedidos.value);

        paramsCot.append("desde", fechaInicioCot.value);
        paramsCot.append("hasta", fechaFinCot.value);

        if (ROL === "ASESOR") {

            paramsPedidos.append("asesor", USER);
            paramsCot.append("asesor", USER);

        } else if (asesorFiltro.value) {

            paramsPedidos.append("asesor", asesorFiltro.value);
            paramsCot.append("asesor", asesorFiltro.value);

        }

        await Promise.all([
            cargarPedidos(paramsPedidos),
            cargarCotizaciones(paramsCot)
        ]);

        calcularResumen();
    }

    async function cargarPedidos(params) {

        const r = await fetch(API_PEDIDOS + "?" + params.toString(), {
            headers: {
                Authorization: "Bearer " + TOKEN
            }
        });

        const j = await r.json();

        pedidos = j.data || j;

        renderPedidos();
    }

    async function cargarCotizaciones(params) {

        const r = await fetch(
            API_COTIZACIONES + "?" + params.toString(),
            {
                headers: {
                    Authorization: "Bearer " + TOKEN
                }
            }
        );

        const j = await r.json();

        cotizaciones = j.data || [];

        renderCotizaciones();
    }

    function filtroPedidos(item) {

        let f = new Date(fechaSQL(item.fecha));
        let fi = new Date(fechaInicioPedidos.value);
        let ff = new Date(fechaFinPedidos.value);

        if (f < fi) return false;
        if (f > ff) return false;

        if (ROL === "ASESOR") return item.asesor === USER;

        if (asesorFiltro.value) return item.asesor === asesorFiltro.value;

        return true;
    }

    function filtroCotizaciones(item) {

        let f = new Date(fechaSQL(item.fecha));
        let fi = new Date(fechaInicioCot.value);
        let ff = new Date(fechaFinCot.value);

        if (f < fi) return false;
        if (f > ff) return false;

        if (ROL === "ASESOR") return item.asesor === USER;

        if (asesorFiltro.value) return item.asesor === asesorFiltro.value;

        return true;
    }

    function renderPedidos() {

        let html = "";
        let totalVenta = 0;
        let totalComision = 0;

        pedidos
            .filter(filtroPedidos)
            .sort((a, b) => new Date(b.fecha) - new Date(a.fecha))
            .forEach(p => {

                const venta = num(p.venta_neta);
                const comision = venta * 0.025;

                totalVenta += venta;
                totalComision += comision;

                html += `
            <div class="filaPedido"
                style="display:grid;grid-template-columns:120px 110px 1.8fr 140px 120px;gap:8px;padding:10px;border-bottom:1px solid #243244;align-items:center;font-size:12px;">

                <div>${p.doc || ""}</div>
                <div>${fechaSQL(p.fecha)}</div>
                <div>${p.cliente || ""}</div>

                <div style="text-align:right;">${money(venta)}</div>

                <div style="text-align:right;color:#22c55e;font-weight:bold;">
                    ${money(comision)}
                </div>

            </div>`;
            });

        if (html === "") {
            html = `
        <div style="padding:40px;text-align:center;color:#94a3b8;">
            No existen pedidos para el rango seleccionado.
        </div>`;
        }

        tablaPedidos.innerHTML = html;
    }

    function renderCotizaciones() {

        let html = "";

        cotizaciones
            .filter(filtroCotizaciones)
            .sort((a, b) => new Date(b.fecha) - new Date(a.fecha))
            .forEach(c => {

                const venta = num(c.venta_neta);
                const comision = venta * 0.025;

                html += `
            <div style="display:grid;grid-template-columns:45px 120px 110px 1.8fr 140px 120px;gap:8px;padding:10px;border-bottom:1px solid #243244;align-items:center;font-size:12px;">

                <div style="text-align:center;">
                    <input type="checkbox" class="chkProy" value="${venta}" onchange="calcularResumen()">
                </div>

                <div>${c.doc || ""}</div>
                <div>${fechaSQL(c.fecha)}</div>
                <div>${c.cliente || ""}</div>

                <div style="text-align:right;">${money(venta)}</div>

                <div style="text-align:right;font-weight:bold;color:#60a5fa;">
                    ${money(comision)}
                </div>

            </div>`;
            });

        if (html === "") {
            html = `
        <div style="padding:45px;text-align:center;color:#94a3b8;">
            No existen cotizaciones para el rango seleccionado.
        </div>`;
        }

        tablaCotizaciones.innerHTML = html;
    }

    function seleccionarTodo() {
        document.querySelectorAll(".chkProy").forEach(c => c.checked = true);
        calcularResumen();
    }

    function quitarTodo() {
        document.querySelectorAll(".chkProy").forEach(c => c.checked = false);
        calcularResumen();
    }

    function calcularResumen() {

        let ventaReal = 0;

        pedidos
            .filter(filtroPedidos)
            .forEach(p => {
                ventaReal += num(p.venta_neta);
            });

        const comisionReal = ventaReal * 0.025;

        let ventaProy = 0;

        document
            .querySelectorAll(".chkProy:checked")
            .forEach(c => {
                ventaProy += num(c.value);
            });

        const comisionProy = ventaProy * 0.025;

        kpiVentaReal.innerHTML = money(ventaReal);
        kpiComisionReal.innerHTML = money(comisionReal);
        kpiVentaProy.innerHTML = money(ventaProy);
        kpiComisionProy.innerHTML = money(comisionProy);

        rVenta.innerHTML = money(ventaReal);
        rComision.innerHTML = money(comisionReal);
        pVenta.innerHTML = money(ventaProy);
        pComision.innerHTML = money(comisionProy);

        granTotal.innerHTML = money(comisionReal + comisionProy);
    }

    asesorFiltro.onchange = consultar;

    fechaInicioPedidos.onchange = consultar;
    fechaFinPedidos.onchange = consultar;
    fechaInicioCot.onchange = consultar;
    fechaFinCot.onchange = consultar;

    window.onload = async function () {

        fechaHoy();

        await consultar();

        await cargarAsesores();
    };

    async function cargarAsesores() {

        if (ROL === "ASESOR") return;

        const lista = [...new Set(
            pedidos
                .map(p => (p.asesor || "").trim())
                .filter(a => a !== "")
        )].sort();

        asesorFiltro.innerHTML = `<option value="">TODOS</option>`;

        lista.forEach(a => {
            asesorFiltro.innerHTML += `<option value="${a}">${a}</option>`;
        });
    }

    document.addEventListener("change", e => {
        if (e.target.classList.contains("chkProy")) {
            calcularResumen();
        }
    });

    document.addEventListener("keydown", e => {
        if (e.key === "Enter") consultar();
    });

    if (ROL !== "ASESOR") {
        asesorFiltro.addEventListener("change", consultar);
    }

</script>

</body>

</html>
